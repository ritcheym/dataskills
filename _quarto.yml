project:
  type: website
  output-dir: docs
  render:
    - "*.qmd"
    - "!*.Rmd"
  resources:
    - files/*.Rmd
    - files/*.html
    
website:
  title: "Data Skills for Psychology"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - modules/index.qmd
      - datasets/index.qmd
      - resources.qmd
      - exercises.qmd
    tools:
      - icon: github
        menu:
          - text: Source Code
            href:  https://github.com/ritcheym/dataskills
  back-to-top-navigation: false
  page-footer: "Last updated March 2026."
    
  sidebar:
    style: "floating"
    search: true
    contents:
      - section: "<b>Modules</b>"
        href: modules/index.qmd
        contents:
          - text: "<mark>Intro to Programming</mark>"
          - modules/01_intro.qmd
          - modules/02_programming-foundations-1.qmd
          - modules/03_programming-foundations-2.qmd
          - text: "<mark>Data Manipulation</mark>"
          - modules/04_data-visualization.qmd
          - modules/05_data-summaries.qmd
          - modules/06_data-wrangling.qmd
          - modules/07_data-tidying.qmd
          - modules/08_data-relations.qmd
          - text: "<mark>Data Analysis</mark>"
          - modules/09_statistical-analysis.qmd
          - modules/10_machine-learning.qmd
          - text: "<mark>Bonus Modules</mark>"
          - modules/00_programming-workshop.qmd
          - modules/11_nlp.qmd
      - text: "<b>Final Project</b>"
        href: projects/final-project.qmd
      - text: "<b>Chapter Summaries</b>"
        href: modules/chapter-summaries.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true

editor: visual

